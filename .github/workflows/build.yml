name: build

# Build the desktop app on macOS + Windows (ADR-104). Runs the offscreen
# smoke tests, then produces an UNSIGNED packaged artifact per OS. Signing +
# notarization need the owner's certs/accounts and are done by the per-OS
# build scripts when the signing env vars are set (ADR-078 K1/K2); CI leaves
# them unset, so artifacts are unsigned but verify the build is reproducible.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt -r requirements-build.txt

      - name: Smoke tests (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python tests/test_iri_boundary.py
          python -c "import importlib, pkgutil, mfl_desktop; bad=0
          for m in pkgutil.walk_packages(mfl_desktop.__path__, 'mfl_desktop.'):
              try: importlib.import_module(m.name)
              except Exception as e: bad+=1; print('FAIL', m.name, e)
          print('import-all bad:', bad); raise SystemExit(1 if bad else 0)"

      - name: Build macOS app
        if: runner.os == 'macOS'
        run: bash packaging/build_macos.sh

      - name: Install Inno Setup (Windows installer)
        if: runner.os == 'Windows'
        run: choco install innosetup --no-progress -y

      - name: Build Windows app
        if: runner.os == 'Windows'
        run: pwsh -ExecutionPolicy Bypass -File packaging/build_windows.ps1

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: mfl-macos
          path: dist/*.dmg
          if-no-files-found: error

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: mfl-windows
          path: dist/*-setup.exe
          if-no-files-found: error
